<!DOCTYPE html>
<html>
	<head>
	<title> LINGO 2025 </title>
		<link rel="stylesheet" href="styles.css" />
		<link rel="icon" type="image/x-icon" href="favicon.ico" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
	</head>
	<body>
		<div id="menu-container">
			<div id="menu-content">
				<img src="images/logo1.png" class="menu-items-image" id="logo" />
				<p class="menu-items-active" id="LVlang" onclick="selectLV()"> LV </p>
				<p class="menu-items" id="ENGlang" onclick="selectENG()"> ENG </p>
				<p class="menu-items" id="highscores" onclick="showHighscores()"> HIGH SCORES </p>
			</div>
		</div>
		<div id="base-container">
			<div id="main-container">
				<div class="table-row">
					<div id="hearts-section">
						<div id="hearts-display">
							<div class="first-row-content" id="heart-3">
								<img src="images/heart.png" alt="heart" class="heart" />
							</div>
							<div class="first-row-content" id="heart-3">
								<img src="images/heart.png" alt="heart" class="heart" />
							</div>
							<div class="first-row-content" id="heart-3">
								<img src="images/heart.png" alt="heart" class="heart" />
							</div>
						</div>
					</div>
					<div id="score-section">
						<p id="score-content"> 0 </p>
					</div>
				</div>
				<div class="table-row">
					<div class="letter-field" id="field-1-1"><p id="letter-1-1" class="letter-style"></p></div>
					<div class="letter-field" id="field-1-2"><p id="letter-1-2" class="letter-style"></p></div>
					<div class="letter-field" id="field-1-3"><p id="letter-1-3" class="letter-style"></p></div>
					<div class="letter-field" id="field-1-4"><p id="letter-1-4" class="letter-style"></p></div>
					<div class="letter-field" id="field-1-5"><p id="letter-1-5" class="letter-style"></p></div>
				</div>
				<div class="table-row">
					<div class="letter-field" id="field-2-1"><p id="letter-2-1" class="letter-style"></p></div>
					<div class="letter-field" id="field-2-2"><p id="letter-2-2" class="letter-style"></p></div>
					<div class="letter-field" id="field-2-3"><p id="letter-2-3" class="letter-style"></p></div>
					<div class="letter-field" id="field-2-4"><p id="letter-2-4" class="letter-style"></p></div>
					<div class="letter-field" id="field-2-5"><p id="letter-2-5" class="letter-style"></p></div>
				</div>
				<div class="table-row">
					<div class="letter-field" id="field-3-1"><p id="letter-3-1" class="letter-style"></p></div>
					<div class="letter-field" id="field-3-2"><p id="letter-3-2" class="letter-style"></p></div>
					<div class="letter-field" id="field-3-3"><p id="letter-3-3" class="letter-style"></p></div>
					<div class="letter-field" id="field-3-4"><p id="letter-3-4" class="letter-style"></p></div>
					<div class="letter-field" id="field-3-5"><p id="letter-3-5" class="letter-style"></p></div>
				</div>
				<div class="table-row">
					<div class="letter-field" id="field-4-1"><p id="letter-4-1" class="letter-style"></p></div>
					<div class="letter-field" id="field-4-2"><p id="letter-4-2" class="letter-style"></p></div>
					<div class="letter-field" id="field-4-3"><p id="letter-4-3" class="letter-style"></p></div>
					<div class="letter-field" id="field-4-4"><p id="letter-4-4" class="letter-style"></p></div>
					<div class="letter-field" id="field-4-5"><p id="letter-4-5" class="letter-style"></p></div>
				</div>
				<div class="table-row">
					<div class="letter-field" id="field-5-1"><p id="letter-5-1" class="letter-style"></p></div>
					<div class="letter-field" id="field-5-2"><p id="letter-5-2" class="letter-style"></p></div>
					<div class="letter-field" id="field-5-3"><p id="letter-5-3" class="letter-style"></p></div>
					<div class="letter-field" id="field-5-4"><p id="letter-5-4" class="letter-style"></p></div>
					<div class="letter-field" id="field-5-5"><p id="letter-5-5" class="letter-style"></p></div>
				</div>
				<div class="table-last-row">
					<div class="letter-field" id="inputLetter-field-5-1"><p id="inputLetter-1" class="letter-style"></p></div>
					<div class="letter-field" id="inputLetter-field-5-2"><p id="inputLetter-2" class="letter-style"></p></div>
					<div class="letter-field" id="inputLetter-field-5-3"><p id="inputLetter-3" class="letter-style"></p></div>
					<div class="letter-field" id="inputLetter-field-5-4"><p id="inputLetter-4" class="letter-style"></p></div>
					<div class="letter-field" id="inputLetter-field-5-5"><p id="inputLetter-5" class="letter-style"></p></div>
				</div>
			</div>
		</div>

		<div id="endgame-modal">
			<div id="modal-content">
				<h1 id="endgame-title"> GAME OVER </h1>
				<p id="engame-score"></p>
				<div id="input-id">
					<input type="text" id="playerName" name="name" placeholder="Enter your name...">
				</div>
			</div>
		</div>

		<div id="highscores-modal">
			<div id="highscores-content"> 
				<div id="highscores-rows">
					<p id="highscores-title"> HIGHSCORES </p>
					<div id="highscores-language-row">
						<p class="highscores-languageSelect-active" id="highscoresButtonLV" onclick="showHighscoresLanguage(0)"> LV </p>
						<p class="highscores-languageSelect" id="highscoresButtonENG" onclick="showHighscoresLanguage(1)"> ENG </p>
					</div>
					<div id="highscores-tablexxx">
						<table id="highscores-table"></table>
					</div>
				</div>
				<span class="close" onclick="closeHighscores()">&times;</span> 
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
